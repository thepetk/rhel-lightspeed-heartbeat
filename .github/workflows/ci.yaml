name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install uv
        uses: astral-sh/setup-uv@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run ty check src/

      - name: Test with coverage
        run: uv run pytest tests/ -v --cov=heartbeat --cov-report=term-missing

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build container image
        run: docker build -f Containerfile -t heartbeat:ci .
